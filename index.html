<!doctype html>
<html>
    <head>
        <meta charset="UTF-8" />
        <meta name="viewport" content="width=device-width, initial-scale=1.0" />
        <title>Shelly's Music!</title>
        <script src="https://cdn.jsdelivr.net/npm/@tailwindcss/browser@4"></script>
        <link rel="stylesheet" href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:opsz,wght,FILL,GRAD@20..48,100..700,0..1,-50..200"/>
        <link rel="preconnect" href="https://fonts.googleapis.com">
        <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
        <link href="https://fonts.googleapis.com/css2?family=Inria+Serif:ital,wght@0,300;0,400;0,700;1,300;1,400;1,700&family=Turret+Road:wght@200;300;400;500;700;800&family=Zen+Dots&display=swap" rel="stylesheet">        <link rel="stylesheet" href="style.css">
    
        <meta property="og:type" content="website">
        <meta property="og:title" content="Shelly's Music!">
        <meta property="og:description" content="🦔🎸✨">
        
        <meta property="og:image" content="https://sheldonwuhung.github.io/music/Assets/Images/guitar3.jpg">
        <meta property="og:image:secure_url" content="https://sheldonwuhung.github.io/music/Assets/Images/guitar3.jpg">
        <meta property="og:image:alt" content="aura farming">

        <meta property="og:locale" content="en_us">
        <meta property="og:url" content="https://sheldonwuhung.github.io/music/">
        <meta property="og:site_name" content="Shelly's Music!">
        <meta property="og:type" content="website">
        <meta property="og:logo" content="https://sheldonwuhung.github.io/music/Assets/Images/guitar3.jpg">
        <meta name="twitter:text:title" content="Shelly's Music!">
        <meta name="twitter:image" content="https://sheldonwuhung.github.io/music/Assets/Images/guitar3.jpg">
        <meta name="twitter:card" content="summary_large_image">
    </head>
    <body class="w-screen flex justify-center">
        <div class="w-[75%] flex flex-col py-10 z-0 mb-[50px] text-xs md:text-md lg:text-lg">
            <div class="flex relative">
                <h1 id="title" class="text-3xl font-bold animated-gradient-text zen-dots-regular">
                    Shelly's Music!
                </h1>
                <svg class="absolute" id="note" width="310" height="734" viewBox="0 0 310 734" fill="none" xmlns="http://www.w3.org/2000/svg">
                    <path d="M0 644.999V713.059L45.5574 734H91.1149H136.672L182.23 713.059V644.999L194.797 345.273L201.081 195.41L203.176 157.061L205.27 136.12L207.365 120.414L289.054 312.029L310 300.511L228.311 41.883L157.618 0L136.672 555.997H91.1149H45.5574L0 576.939V644.999Z" fill="#939CFB"/>
                </svg>
            </div>
            <div class="grid grid-cols-1 gap-x-8 md:grid-cols-2 turret-road-bold">
                <div class="py-[10px]">
                    <h2 class="text-2xl">Guitar Covers</h2>
                    <div id="guitar-list" class="py-[2%]"></div>
                </div>
                <div class="py-[10px]">
                    <h2 class="text-2xl">Original Songs</h2>
                    <div id="songs-list" class="py-[2%]"></div>
                </div>
            </div>
        </div>
        <div id="main-player" class="w-[100%] h-[7.5%] py-[10px] flex justify-center items-center turret-road-bold text-xs md:text-lg lg:text-2xl">
            <div class="w-[100%] md:w-[75%] card h-[100%] flex">
                <audio id="main-audio"><source src="" type="audio/mpeg"></audio>
                <button id="main-interact" class="interact material-symbols-outlined w-[5%]">play_arrow</button>
                <h3 id="main-track" class="px-[10px] w-[20%]">Choose a Track</h3>
                <h3 id="left-time" class="w-[10%]">0:00</h3>
                <div id="progress-container" class="w-[45%] h-[75%] flex items-center">
                    <div class="bar" id="progress-bar"></div>
                    <input class="slider" type="range" id="progress-slider" value="0" min="0" step="1">
                </div>
                <h3 id="right-time" class="pr-[20px] w-[10%] text-end">0:00</h3>
                <button id="volume-icon" class="hidden md:flex material-symbols-outlined hidden w-[0%] md:flex md:w-[5%]">volume_up</button>
                <div id="volume-container" class="hidden md:flex w-[15%] h-[75%] flex items-center">
                    <div class="bar" id="volume-bar"></div>
                    <input class="slider" type="range" id="volume-slider" value="0" min="0" step="1">
                </div>
            </div>
        </div>
        <div id="hover-text" class="z-1 absolute turret-road-bold"><h3>test</h3></div>
        <script src="scripts.js" defer></script>
    </body>   
</html>
